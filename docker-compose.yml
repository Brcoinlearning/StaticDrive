services:
  pocketbase:
    build:
      context: .
      dockerfile: docker/pocketbase.Dockerfile
    container_name: static-content-pocketbase
    restart: unless-stopped
    env_file:
      - ${APP_ENV_FILE:-.env}
    ports:
      - "8090:8090"
    volumes:
      - ${APP_ENV_FILE:-./.env}:/app/.env:ro
      - ./pocketbase/data:/app/pocketbase/data
      - ./pocketbase/public:/app/pocketbase/public
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8090/api/health"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 10s

  app:
    build:
      context: .
      dockerfile: docker/app.Dockerfile
    container_name: static-content-app
    restart: unless-stopped
    depends_on:
      pocketbase:
        condition: service_healthy
    env_file:
      - ${APP_ENV_FILE:-.env}
    ports:
      - "8787:8787"
    volumes:
      - ${APP_ENV_FILE:-./.env}:/app/.env:ro
      - ./workspace:/app/workspace
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:8787/api/health').then((r)=>{if(!r.ok)process.exit(1)}).catch(()=>process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 10s
